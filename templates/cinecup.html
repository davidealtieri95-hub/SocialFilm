{% extends "layout.html" %}
{% block content %}
<div class="container py-5 text-center" style="max-width: 800px;">
    <h1 class="display-4 fw-bold text-warning mb-2">🏆 CINE-CUP</h1>
    <h3 class="text-white mb-4">{{ round_name }}</h3>
    <p class="text-secondary">Scontro {{ match_num }} di {{ tot_matches }}</p>
    
    <div class="row align-items-center mt-5">
        <!-- Film A -->
        <div class="col-md-5 mb-4">
            <div class="card bg-dark text-white border-warning h-100 p-3">
                <img src="{{ film_a.locandina }}" class="card-img-top rounded img-fluid" style="max-height: 350px; object-fit: cover;" alt="{{ film_a.titolo }}">
                <div class="card-body">
                    <h5 class="card-title text-warning">{{ film_a.titolo }}</h5>
                    <form action="/cinecup" method="POST">
                        <input type="hidden" name="vincitore_id" value="{{ film_a.id_tmdb }}">
                        <button type="submit" class="btn btn-warning w-100 mt-3">Vota Questo 👍</button>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-md-2 mb-4">
            <h2 class="text-danger fw-bold">VS</h2>
        </div>

        <!-- Film B -->
        <div class="col-md-5 mb-4">
            <div class="card bg-dark text-white border-warning h-100 p-3">
                <img src="{{ film_b.locandina }}" class="card-img-top rounded img-fluid" style="max-height: 350px; object-fit: cover;" alt="{{ film_b.titolo }}">
                <div class="card-body">
                    <h5 class="card-title text-warning">{{ film_b.titolo }}</h5>
                    <form action="/cinecup" method="POST">
                        <input type="hidden" name="vincitore_id" value="{{ film_b.id_tmdb }}">
                        <button type="submit" class="btn btn-warning w-100 mt-3">Vota Questo 👍</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
