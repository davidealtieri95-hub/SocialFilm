<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>SocialFilm - Login</title>
</head>
<body style="background: #121212; color: white; font-family: sans-serif; max-width: 400px; margin: 0 auto; padding: 50px 20px;">
    <h2 style="text-align: center; color: #ff4757;">Accedi a SocialFilm 🔑</h2>
    
    <form method="POST" style="background: #1e272e; padding: 25px; border-radius: 8px; border: 1px solid #2f3542;">
        <label>Email:</label><br>
        <input type="email" name="email" required style="width: 100%; padding: 8px; margin: 8px 0 20px 0; border-radius: 4px; border: none;"><br>
        
        <label>Password:</label><br>
        <input type="password" name="password" required style="width: 100%; padding: 8px; margin: 8px 0 20px 0; border-radius: 4px; border: none;"><br>
        
        <button type="submit" style="width: 100%; background: #1e90ff; color: white; padding: 10px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer;">Entra</button>
    </form>
    <p style="text-align: center; font-size: 0.9em; margin-top: 15px;">Nuovo su SocialFilm? <a href="/register" style="color: #2ed573;">Registrati ora</a></p>
</body>
</html>
